<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑胶唱片音乐播放器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* ✅ 修正背景图路径 */
            background-image: url('img/2.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(6px);
            opacity: 0.3;
            z-index: -1;
        }
        .music-player {
            width: 100%;
            max-width: 900px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 50px;
            margin-bottom: 40px;
        }
        .vinyl-container {
            position: relative;
            width: 400px;
            height: 400px;
        }
        .vinyl {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #111;
            border: 15px solid #222;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s ease;
        }
        .vinyl.rotate {
            animation: spin 8s linear infinite;
        }
        .album-cover {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            overflow: hidden;
            border: 8px solid #333;
        }
        .album-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .vinyl::before {
            content: '';
            position: absolute;
            width: 90%;
            height: 90%;
            border-radius: 50%;
            border: 2px dashed #444;
        }
        .vinyl::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #666;
            z-index: 2;
        }
        .song-info {
            text-align: left;
            flex: 1;
            min-width: 200px;
        }
        .song-title {
            font-size: 60px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #fff;
        }
        .song-artist {
            font-size: 24px;
            color: #aaa;
            margin-bottom: 30px;
        }
        .control-progress {
            width: 100%;
            max-width: 800px;
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
        }
        .control-btn {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: color 0.3s ease;
        }
        .control-btn:hover {
            color: #ff6b9d;
        }
        .play-btn {
            font-size: 36px;
            width: 60px;
            height: 60px;
        }
        .loop-btn {
            width: 50px;
            height: 50px;
        }
        .loop-btn img {
            width: 70%;
            height: 70%;
            object-fit: contain;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }
        .loop-btn.active img {
            opacity: 1;
            filter: brightness(1.2);
        }
        .volume-btn {
            background: transparent;
            border: none;
            width: 30px;
            height: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .volume-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* 播放列表按钮 5.png */
        .playlist-btn {
            background: transparent;
            border: none;
            width: 30px;
            height: 30px;
            cursor: pointer;
        }
        .playlist-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* 新增：6.png 按钮样式 */
        .extra-btn {
            background: transparent;
            border: none;
            width: 30px;
            height: 30px;
            cursor: pointer;
        }
        .extra-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .progress-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .time-text {
            font-size: 14px;
            color: #aaa;
            width: 60px;
        }
        .progress-bar {
            flex: 1;
            height: 4px;
            background: #444;
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }
        .progress {
            height: 100%;
            background: #ff6b9d;
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
        }
        .volume-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .volume-slider {
            width: 80px;
            height: 4px;
            appearance: none;
            background: #444;
            border-radius: 2px;
            outline: none;
        }
        .volume-slider::-webkit-slider-thumb {
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff6b9d;
            cursor: pointer;
        }
        .aux-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 18px;
            color: #aaa;
        }

        /* 播放列表样式 */
        .playlist {
            position: absolute;
            bottom: 70px;
            right: 0;
            width: 240px;
            background: rgba(0,0,0,0.85);
            border-radius: 10px;
            padding: 15px;
            display: none;
            z-index: 999;
        }
        .playlist.show {
            display: block;
        }
        .playlist-item {
            padding: 8px 10px;
            font-size: 14px;
            color: #ccc;
            cursor: pointer;
            border-radius: 6px;
            margin-bottom: 4px;
        }
        .playlist-item:hover {
            background: #333;
            color: #fff;
        }
        .playlist-item.active {
            color: #ff6b9d;
            font-weight: bold;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="music-player">
        <div class="vinyl-container">
            <div class="vinyl" id="vinyl">
                <div class="album-cover">
                    <img id="cover-img" src="" alt="封面">
                </div>
            </div>
        </div>
        <div class="song-info">
            <h1 class="song-title" id="song-title"></h1>
            <p class="song-artist" id="song-artist"></p>
        </div>
    </div>

    <div class="control-progress">
        <!-- ✅ 修正循环按钮路径 -->
        <button class="control-btn loop-btn" id="loop-btn">
            <img src="img/3.png" alt="循环">
        </button>
        <button class="control-btn" id="prev-btn">⏮</button>
        <button class="control-btn play-btn" id="play-btn">▶</button>
        <button class="control-btn" id="next-btn">⏭</button>
        
        <div class="progress-wrapper">
            <span class="time-text" id="current-time">00:00</span>
            <div class="progress-bar" id="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
            <span class="time-text" id="duration"></span>
        </div>

        <div class="aux-controls">
            <div class="volume-wrapper">
                <button class="volume-btn" id="volume-btn">
                    <img src="img/4.png" alt="音量">
                </button>
                <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.01" value="1">
            </div>

      
            <button class="playlist-btn" id="playlist-btn">
                <img src="img/5.png" alt="播放列表">
            </button>

       
            <button class="extra-btn">
                <img src="img/6.png" alt="功能">
            </button>
        </div>

        <!-- 播放列表 -->
        <div class="playlist" id="playlist">
            <div class="playlist-item" data-index="0">飞行模式</div>
            <div class="playlist-item" data-index="1">点燃银河尽头的篝火</div>
            <div class="playlist-item" data-index="2">向阳而生</div>
        </div>
    </div>

    <audio id="audio" preload="metadata">

    <script>
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('play-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const vinyl = document.getElementById('vinyl');
        const progressBar = document.getElementById('progress-bar');
        const progress = document.getElementById('progress');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');
        const songTitleEl = document.getElementById('song-title');
        const songArtistEl = document.getElementById('song-artist');
        const coverImg = document.getElementById('cover-img');
        const volumeSlider = document.getElementById('volume-slider');
        const loopBtn = document.getElementById('loop-btn');
        const volumeBtn = document.getElementById('volume-btn');
        const playlistBtn = document.getElementById('playlist-btn');
        const playlist = document.getElementById('playlist');
        const playlistItems = document.querySelectorAll('.playlist-item');

        // ✅ 修正封面图路径
        const songs = [
            {
                title: '飞行模式',
                artist: '作者：华晨宇',
                cover: 'img/1.png',
                src: 'song.mp3',
                duration: '04:25'
            },
            {
                title: '点燃银河尽头的篝火',
                artist: '作者：华晨宇',
                cover: 'img/1.png',
                src: 'song.mp3',
                duration: '04:25'
            },
            {
                title: '向阳而生',
                artist: '作者：华晨宇',
                cover: 'img/1.png',
                src: 'song.mp3',
                duration: '04:25'
            }
        ];

        let currentSongIndex = 0;
        let isPlaying = false;
        let isLoop = false;

        loadSong(songs[currentSongIndex]);

        function loadSong(song) {
            songTitleEl.textContent = song.title;
            songArtistEl.textContent = song.artist;
            durationEl.textContent = song.duration;
            audio.src = song.src;
            coverImg.src = song.cover;
            progress.style.width = '0%';
            currentTimeEl.textContent = '00:00';
            isPlaying = false;
            playBtn.innerHTML = '▶';
            vinyl.classList.remove('rotate');

            playlistItems.forEach((item, i) => {
                item.classList.toggle('active', i === currentSongIndex);
            });
        }

        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                vinyl.classList.remove('rotate');
                playBtn.innerHTML = '▶';
            } else {
                audio.play();
                vinyl.classList.add('rotate');
                playBtn.innerHTML = '⏸';
            }
            isPlaying = !isPlaying;
        }

        function prevSong() {
            currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
            loadSong(songs[currentSongIndex]);
            if (isPlaying) setTimeout(() => togglePlay(), 100);
        }

        function nextSong() {
            if (isLoop) {
                audio.currentTime = 0;
                audio.play();
            } else {
                currentSongIndex = (currentSongIndex + 1) % songs.length;
                loadSong(songs[currentSongIndex]);
                if (isPlaying) setTimeout(() => togglePlay(), 100);
            }
        }

        function toggleLoop() {
            isLoop = !isLoop;
            loopBtn.classList.toggle('active', isLoop);
        }

        function updateProgress() {
            if (!isNaN(audio.duration)) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progress.style.width = percent + '%';
                currentTimeEl.textContent = formatTime(audio.currentTime);
            }
        }

        function formatTime(time) {
            const m = Math.floor(time / 60);
            const s = Math.floor(time % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function setProgress(e) {
            audio.currentTime = (e.offsetX / progressBar.clientWidth) * audio.duration;
        }

        // 音量静音
        volumeBtn.addEventListener('click', () => {
            if (audio.volume > 0) {
                audio.volume = 0;
                volumeSlider.value = 0;
            } else {
                audio.volume = 1;
                volumeSlider.value = 1;
            }
        });

        volumeSlider.addEventListener('input', () => {
            audio.volume = volumeSlider.value;
        });

        // 播放列表显示/隐藏
        playlistBtn.addEventListener('click', () => {
            playlist.classList.toggle('show');
        });

        // 点击列表切歌
        playlistItems.forEach((item, i) => {
            item.addEventListener('click', () => {
                currentSongIndex = i;
                loadSong(songs[i]);
                togglePlay();
                playlist.classList.remove('show');
            });
        });

        loopBtn.addEventListener('click', toggleLoop);
        audio.addEventListener('ended', nextSong);
        audio.addEventListener('timeupdate', updateProgress);
        progressBar.addEventListener('click', setProgress);
        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', prevSong);
        nextBtn.addEventListener('click', nextSong);
    </script>
</body>
</html>
